    let sortedKeys=[], myInventory=JSON.parse(localStorage.getItem('dmc_v5_quantities'))||{}, myProjects=JSON.parse(localStorage.getItem('dmc_projects'))||[], barcodeMap=JSON.parse(localStorage.getItem('dmc_barcodes_v4'))||{"077540050727":"208"}, onlyShowOwned=false, pressTimer, touchStartPos={x:0,y:0}, currentSheetNum=null, reviewList=[];
    
    window.onpopstate = () => { if(document.getElementById('checklist-view').style.display==='block') closeChecklist(true); };
    
    function init() {
        sortedKeys=Object.keys(dmcData).sort((a,b)=>{const isA=!isNaN(a),isB=!isNaN(b); return (isA&&isB)?parseInt(a)-parseInt(b):(isA?-1:isB?1:a.localeCompare(b));}); 
        renderList(); renderProjects(); 
    }

    function showTab(t){ 
        document.querySelectorAll('.view-section').forEach(s=>s.classList.remove('active')); 
        document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); 
        document.getElementById(`tab-${t}`).classList.add('active'); 
        if(t==='all'||t==='owned'){document.getElementById('view-library').classList.add('active'); onlyShowOwned=(t==='owned'); renderList();} 
        else {document.getElementById(`view-${t}`).classList.add('active'); if(t==='projects')renderProjects();} 
    }

    // THE V6.9.8 HARD-LOCK GESTURES
    function onStart(e, num) {
        const t = e.touches ? e.touches[0] : e;
        touchStartPos = { x: t.pageX, y: t.pageY };
        clearTimeout(pressTimer);
        pressTimer = setTimeout(() => {
            openQuantitySheet(num);
            if (navigator.vibrate) navigator.vibrate(50);
        }, 500);
    }
    function onMove(e) {
        const t = e.touches ? e.touches[0] : e;
        if (Math.sqrt(Math.pow(t.pageX - touchStartPos.x, 2) + Math.pow(t.pageY - touchStartPos.y, 2)) > 20) clearTimeout(pressTimer);
    }
    function onEnd() { clearTimeout(pressTimer); }

    function renderList(){
        const q=document.getElementById('searchInput').value.toLowerCase(), c=document.getElementById('masterList'); c.innerHTML=''; let count=0;
        sortedKeys.forEach(n=>{
            const qty=myInventory[n]||0; if(onlyShowOwned&&qty===0)return; if(q&&!n.toLowerCase().includes(q))return;
            const d=dmcData[n], card=document.createElement('div'); card.className=`color-card ${qty > 0?'owned':''}`;
            card.style.backgroundColor=d.p; card.style.color=getContrastColor(d.p);
            card.onpointerdown=e=>onStart(e,n); card.onpointerup=onEnd; card.onpointerleave=onEnd; card.oncontextmenu=e=>{e.preventDefault(); return false;};
            card.innerHTML=`<span class="color-num">${n}</span>`+(qty>=1?`<div class="qty-badge">${qty}</div>`:'');
            c.appendChild(card); if(qty>0)count++;
        });
        if (!onlyShowOwned && !q) {
            const cam=document.createElement('div'); cam.className='camera-card'; cam.onclick=toggleScanner;
            cam.innerHTML=`<svg viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m8 3a5 5 0 0 0-5 5 5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5m0 2a3 3 0 0 1 3 3 3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3Z"/></svg>`;
            c.appendChild(cam);
        }
        document.getElementById('ownedCount').innerText=count;
    }

    function openQuantitySheet(n){ currentSheetNum=n; const d=dmcData[n.toUpperCase()]; document.getElementById('quantity-modal').style.display='flex'; document.getElementById('sheet-name').innerText=`DMC ${n}`; document.getElementById('sheet-full-name').innerText=d?d.n:"Unknown Brand"; document.getElementById('sheet-swatch').style.backgroundColor=d?d.p:"#A6A6A6"; document.getElementById('sheet-qty').innerText=myInventory[n]||0; }

    function updateQty(d){ myInventory[currentSheetNum]=Math.max(0,Math.min(50,(myInventory[currentSheetNum]||0)+d)); document.getElementById('sheet-qty').innerText=myInventory[currentSheetNum]; }
    function getContrastColor(h){ const r=parseInt(h.substr(1,2),16), g=parseInt(h.substr(3,2),16), b=parseInt(h.substr(5,2),16); return ((r*299+g*587+b*114)/1000>=128)?'black':'white'; }
    function closeChecklist(isPop=false){ document.getElementById('checklist-view').style.display='none'; if(!isPop) history.back(); showTab('projects'); }

    function renderProjects(){ const g=document.getElementById('projectGrid'); g.innerHTML=`<div class="project-card new-btn" onclick="document.getElementById('add-project-modal').style.display='flex'"><div class="new-btn-text">+ new project</div></div>`; myProjects.forEach((p,i)=>{ const d=document.createElement('div'); d.className='project-card'; d.onclick=()=>openChecklist(i); d.innerHTML=`<svg style="width:52px;height:52px;fill:#666" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg><span class="project-name">${p.name}</span><button class="delete-btn" onclick="event.stopPropagation(); deleteProject(i)">✕</button>`; g.appendChild(d); }); }

    async function processProjectImage(){ const fi=document.getElementById('proj-image'), ni=document.getElementById('new-proj-name'); if(!fi.files[0]||!ni.value)return alert("Select image and name"); document.getElementById('ocr-loading').style.display='block'; const file=fi.files[0]; document.getElementById('review-image-display').src=URL.createObjectURL(file); const worker=await Tesseract.createWorker(); await worker.loadLanguage('eng'); await worker.initialize('eng'); await worker.setParameters({tessedit_char_whitelist:'0123456789'}); const {data:{text}}=await worker.recognize(file); await worker.terminate(); reviewList=[...new Set(text.match(/\b\d{1,4}\b/g)||[])]; document.getElementById('ocr-loading').style.display='none'; document.getElementById('add-project-modal').style.display='none'; renderReviewList(); }

    function updateReviewItemSilent(i,el){ reviewList[i]=el.value.trim().toUpperCase(); el.className=dmcData[reviewList[i]]?'valid':'invalid'; }

    function importData(e){ const r=new FileReader(); r.onload=(ev)=>{const d=JSON.parse(ev.target.result); myInventory=d.inventory||{}; myProjects=d.projects||[]; localStorage.setItem('dmc_v5_quantities',JSON.stringify(myInventory)); localStorage.setItem('dmc_projects',JSON.stringify(myProjects)); location.reload();}; r.readAsText(e.target.files[0]); }
    let hs=null, scActive=false; function toggleScanner(){ const sc=document.getElementById('scanner-container'); scActive=!scActive; sc.style.display=scActive?'flex':'none'; if(scannerActive){ hs=new Html5QrcodeScanner("reader",{fps:10,qrbox:250}); hs.render((b)=>{let cn=barcodeMap[b]; if(!cn){cn=prompt(`New Barcode: ${b}\nWhat DMC #?`); if(cn){cn=cn.replace('*','').toUpperCase().trim(); barcodeMap[b]=cn;}} if(cn){myInventory[cn]=(myInventory[cn]||0)+1; localStorage.setItem('dmc_v5_quantities',JSON.stringify(myInventory)); renderList(); if(navigator.vibrate)navigator.vibrate(100);}}); } else if(hs){hs.clear();} }
    init(); if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>

<div id="add-project-modal" class="modal"><div class="modal-content"><h2 style="font-size:2.8rem;margin-bottom:40px">New Project</h2><input type="text" id="new-proj-name" class="modal-input" placeholder="Project Name"><label for="proj-image" class="modal-file-label" id="file-label">TAP TO SELECT IMAGE</label><input type="file" id="proj-image" accept="image/*" style="display:none" onchange="document.getElementById('file-label').innerText=this.files[0].name"><button id="ocr-start-btn" class="modal-main-btn" onclick="processProjectImage()" style="font-weight:400">CONTINUE</button><button onclick="document.getElementById('add-project-modal').style.display='none'" style="margin-top:30px;color:#aaa;background:none;border:none;font-size:18px;font-weight:bold;text-transform:uppercase">CANCEL</button></div></div>
<div id="review-modal" class="modal"><div class="modal-content"><h2>Review Colors</h2><div class="review-split"><div class="review-img-side" id="img-scroller"><img id="review-image-display" src=""></div><div class="review-list-side" id="review-list-side"></div></div><button onclick="saveProject()" style="width:100%;padding:20px;background:var(--dmc-green);color:#fff;border:none;border-radius:20px;font-weight:bold;font-size:24px">SAVE PROJECT</button></div></div>
<div id="scanner-container" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:2000; flex-direction:column; justify-content:center; align-items:center;"><div id="reader" style="width:100%"></div><button onclick="toggleScanner()" style="width:90%; padding:25px; margin-top:25px; border:none; background:#fff; color:#000; border-radius:20px; font-weight:bold; font-size:22px;">CLOSE SCANNER</button></div>
</body>
</html>
