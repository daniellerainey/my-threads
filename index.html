<!DOCTYPE html>
<html lang="en">
<!-- Link to the manifest we just made -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a148c">
    
    <!-- This script registers the "Service Worker" -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DMC Color Tracker</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --dmc-purple: #4a148c; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; margin: 0; padding-bottom: 100px; }
        header { background: var(--dmc-purple); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        
        #reader { width: 100%; max-width: 400px; margin: 10px auto; border-radius: 12px; overflow: hidden; background: white; }
        
        .controls { padding: 15px; position: sticky; top: 60px; background: #f5f5f5; z-index: 90; }
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }

        .list-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); 
            gap: 12px; 
            padding: 15px; 
        }
        
        .color-card { 
            aspect-ratio: 1 / 1;
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            cursor: pointer;
            border: 4px solid transparent;
            transition: transform 0.1s;
        }
        .color-card:active { transform: scale(0.95); }
        .color-card.owned { border-color: #2e7d32; }
        .color-card.owned::after {
            content: "✓"; position: absolute; top: 5px; right: 8px; font-weight: bold; font-size: 18px;
        }

        .color-num { font-size: 20px; font-weight: 900; margin-bottom: 2px; }
        .color-name { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8; }

        .stats-bar { 
            position: fixed; bottom: 0; width: 100%; background: white; 
            padding: 20px; border-top: 1px solid #ddd; display: flex; 
            justify-content: space-around; align-items: center; z-index: 100;
        }
        .filter-btn { background: var(--dmc-purple); color: white; border: none; padding: 10px 15px; border-radius: 8px; }
    </style>
</head>
<body>

<header><h2 style="margin:0">DMC Tracker</h2></header>

<div id="reader"></div>

<div class="controls">
    <input type="text" id="searchInput" class="search-box" placeholder="Search by number (e.g. 310)" oninput="renderList()">
</div>

<div id="masterList" class="list-container"></div>

<div class="stats-bar">
    <b>Owned: <span id="ownedCount">0</span></b>
    <button class="filter-btn" onclick="toggleFilter()" id="filterBtn">Show Owned Only</button>
</div>

<script>
    // COLOR DATABASE (Sample of 500+ colors)
    // Hex codes provided for major ranges
    const dmcData = {
        "310": { h: "#000000", t: "white" }, "Blanc": { h: "#FFFFFF", t: "black" }, "B5200": { h: "#FFFFFF", t: "black" },
        "666": { h: "#E31D23", t: "white" }, "208": { h: "#8359A3", t: "white" }, "209": { h: "#A284BA", t: "white" },
        "210": { h: "#C1AECF", t: "black" }, "211": { h: "#E1D5E7", t: "black" }, "321": { h: "#C10029", t: "white" },
        "700": { h: "#007D3A", t: "white" }, "743": { h: "#FFD44F", t: "black" }, "796": { h: "#003F80", t: "white" },
        "995": { h: "#00A2E2", t: "black" }, "3801": { h: "#E91D32", t: "white" }, "907": { h: "#9CCB3B", t: "black" },
        "606": { h: "#FF3300", t: "white" }, "444": { h: "#FFD600", t: "black" }, "996": { h: "#33CCFF", t: "black" },
        "150": { h: "#9D0631", t: "white" }, "151": { h: "#F0A3B5", t: "black" }, "152": { h: "#D18E8E", t: "black" }
        // The app will generate generic grays for missing codes
    };

    // GENERATE ALL NUMBERS
    const allNumbers = [];
    [[1,35],[150,169],[208,996],[3011,3866]].forEach(r=>{for(let i=r[0];i<=r[1];i++)allNumbers.push(i.toString())});
    allNumbers.push("Blanc","B5200","Ecru");

    let myInventory = JSON.parse(localStorage.getItem('dmc_owned_v2')) || {};
    let barcodeMap = JSON.parse(localStorage.getItem('dmc_barcodes_v2')) || {"077540050727":"208"};
    let onlyShowOwned = false;

    function renderList() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const container = document.getElementById('masterList');
        container.innerHTML = '';
        
        let count = 0;
        allNumbers.forEach(num => {
            const isOwned = myInventory[num];
            if (onlyShowOwned && !isOwned) return;
            if (query && !num.toLowerCase().includes(query)) return;

            // Get color or default to a neutral gray
            const color = dmcData[num] || { h: "#ccc", t: "black" };

            const card = document.createElement('div');
            card.className = `color-card ${isOwned ? 'owned' : ''}`;
            card.style.backgroundColor = color.h;
            card.style.color = color.t;
            card.onclick = () => toggleOwned(num);
            card.innerHTML = `<span class="color-num">${num}</span>`;
            
            container.appendChild(card);
            if(isOwned) count++;
        });
        document.getElementById('ownedCount').innerText = count;
    }

    function toggleOwned(num) {
        myInventory[num] = !myInventory[num];
        if (!myInventory[num]) delete myInventory[num];
        localStorage.setItem('dmc_owned_v2', JSON.stringify(myInventory));
        renderList();
    }

    function toggleFilter() {
        onlyShowOwned = !onlyShowOwned;
        document.getElementById('filterBtn').innerText = onlyShowOwned ? "Show All Colors" : "Show Owned Only";
        renderList();
    }

    const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 200 });
    scanner.render((barcode) => {
        let colorNum = barcodeMap[barcode];
        if (!colorNum) {
            colorNum = prompt(`New Barcode: ${barcode}\nWhat DMC #?`);
            if (colorNum) { barcodeMap[barcode] = colorNum; localStorage.setItem('dmc_barcodes_v2', JSON.stringify(barcodeMap)); }
        }
        if (colorNum) {
            myInventory[colorNum] = true;
            localStorage.setItem('dmc_owned_v2', JSON.stringify(myInventory));
            renderList();
            alert(`Added DMC ${colorNum}`);
        }
    });

    renderList();
</script>
</body>
</html>
